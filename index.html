<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>Antje's poem generator</h1>
        </header>

        <main>
            <form id="poem-generator-form">
                <input type="text" placeholder="Enter the topic of your poem here" autofocus required autocomplete="off"
                    class="instructions" />
                <input type="submit" class="submit-button" />
            </form>
            <div class="poem" id="poem">
            </div>

        </main>

        <footer>This project was coded by <a href="https://github.com/antjekunert4-png" target="_blank"> Antje
                Kunert</a>
            and is <a href="https://github.com/antjekunert4-png/poem-generator/tree/main" target="_blank">open-soourced
                on
                GitHub</a> and is <a href="https://antjes-poem-generator.netlify.app/" target="_blank">hosted on
                Netlify.</a>
        </footer>
    </div>
    <script src="src/index.js"></script>
</body>

</html>
